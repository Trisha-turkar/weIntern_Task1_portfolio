<script>

const words = [
"Web Developer",
"Frontend Developer",
"UI Designer",
"Creative Coder"
];

let i=0;
let j=0;
let currentWord="";
let isDeleting=false;

function type(){

currentWord = words[i];

if(isDeleting){
j--;
}else{
j++;
}

document.querySelector(".typing").textContent =
currentWord.substring(0,j);

if(!isDeleting && j===currentWord.length){
isDeleting=true;
setTimeout(type,1000);
return;
}

if(isDeleting && j===0){
isDeleting=false;
i=(i+1)%words.length;
}

setTimeout(type,isDeleting?70:120);
}

type();

</script>
